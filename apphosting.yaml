runConfig:
  cpu: 2
  memoryMiB: 2048
  minInstances: 0
  maxInstances: 10
  concurrency: 20

env:
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_SITE_URL
    availability: [BUILD, RUNTIME]
  - variable: FIREBASE_PROJECT_ID
    availability: [RUNTIME]
  - variable: FIREBASE_STORAGE_BUCKET
    availability: [RUNTIME]
  - variable: GOOGLE_GENERATIVE_AI_API_KEY
    secret: GOOGLE_GENERATIVE_AI_API_KEY
    availability: [RUNTIME]
  - variable: GEMINI_TEXT_MODEL
    value: gemini-2.5-flash
    availability: [RUNTIME]
  - variable: GEMINI_IMAGE_MODEL
    value: gemini-3.1-flash-image-preview
    availability: [RUNTIME]
  - variable: GEMINI_TTS_MODEL
    value: gemini-2.5-flash-preview-tts
    availability: [RUNTIME]
  - variable: FEEDBACK_WEBHOOK_URL
    availability: [RUNTIME]
  - variable: FEEDBACK_WEBHOOK_SECRET
    secret: FEEDBACK_WEBHOOK_SECRET
    availability: [RUNTIME]
  - variable: PHYSICAL_BOOK_PRICE_CENTS
    value: "4900"
    availability: [BUILD, RUNTIME]
  - variable: PHYSICAL_BOOK_SHIPPING_CENTS
    value: "800"
    availability: [BUILD, RUNTIME]
